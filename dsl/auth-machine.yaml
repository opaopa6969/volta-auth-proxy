# volta-auth-proxy Auth State Machine
# Purpose: AI specification + test generation + documentation generation
# Version: 3
# Changes from v2:
#   - Added callback_nonce_invalid transition (fixes deadlock)
#   - Added tenant_inactive_verify in AUTHENTICATED (tenant inactive but not suspended)
#   - Changed cancel triggers to concrete HTTP endpoints
#   - Added priority to all same-trigger transitions
#   - Added config to context
#   - Added target_session to context
# Changes from v1:
#   - OIDC_PENDING → AUTH_PENDING (SAML extensibility)
#   - Added global_transitions (logout, session_timeout from any state)
#   - Added oidc_flow to context (state_valid, nonce_valid)
#   - Fixed INVITE_CONSENT cancel → NO_TENANT (was undefined AUTHENTICATED_NO_TENANT)
#   - Added initial state declaration
#   - Added invariants
#   - Clarified next_if merge_strategy: append
#   - Error codes reference dsl/errors.yaml (single source of truth)
#   - Guard expressions use CEL-like syntax with defined operators

version: 3
errors_ref: "dsl/errors.yaml"
initial_state: UNAUTHENTICATED

# ────────────────────────────────
# Guard expression syntax (CEL-like)
# ────────────────────────────────
# Operators: &&, ||, !, ==, !=, >, <, >=, <=, in
# Variables: from context section below
# Literals: true, false, integers, "strings", [arrays]
# Functions: none (Phase 2: custom functions)
# Evaluation: short-circuit (left to right)
# Example: "session.valid && !tenant.suspended && membership.role in ['ADMIN', 'OWNER']"

# ────────────────────────────────
# Context: typed variables for guards
# ────────────────────────────────
context:
  session:
    valid: bool
    expired: bool
    tenant_id: uuid?
    user_id: uuid?
    csrf_token: string
    concurrent_count: int
  user:
    exists: bool
    active: bool
    email: string
    tenant_count: int
  membership:
    exists: bool
    active: bool
    role: enum[OWNER, ADMIN, MEMBER, VIEWER]
  tenant:
    active: bool
    suspended: bool
    slug: string
  invite:
    present: bool
    valid: bool
    expired: bool
    used: bool
    email_match: bool
  oidc_flow:
    state_valid: bool
    nonce_valid: bool
    email_verified: bool
    has_error_param: bool
  request:
    accept_json: bool
    has_return_to: bool
    return_to: string?
  config:
    default_app_url: string
    allow_tenant_creation: bool
    support_contact: string
  target_session:
    id: uuid
    user_id: uuid
    exists: bool

# ────────────────────────────────
# Action types
# ────────────────────────────────
# side_effect:  DB write, state mutation. Transactional.
# http:         HTTP response (redirect, headers, JSON, HTML). Terminal.
# audit:        Audit log entry. Non-blocking.
# guard_check:  Validation that can fail with specific error.

# ────────────────────────────────
# next_if merge strategy
# ────────────────────────────────
# When a transition has both top-level `actions` and `next_if[].actions`:
#   merge_strategy: append
#   Top-level actions execute FIRST, then branch-specific actions.
#   If top-level actions fail, branch actions do NOT execute.

merge_strategy: append

# ────────────────────────────────
# Global transitions (apply to all states except UNAUTHENTICATED)
# ────────────────────────────────
global_transitions:
  logout_browser:
    trigger: "POST /auth/logout"
    guard: "!request.accept_json"
    from_except: [UNAUTHENTICATED, AUTH_PENDING]
    actions:
      - { type: side_effect, action: invalidate_session }
      - { type: side_effect, action: clear_cookie }
      - { type: audit, event: LOGOUT }
      - { type: http, action: redirect, target: "/login" }
    next: UNAUTHENTICATED

  logout_api:
    trigger: "POST /auth/logout"
    guard: "request.accept_json"
    from_except: [UNAUTHENTICATED, AUTH_PENDING]
    actions:
      - { type: side_effect, action: invalidate_session }
      - { type: side_effect, action: clear_cookie }
      - { type: audit, event: LOGOUT }
      - { type: http, action: json_ok }
    next: UNAUTHENTICATED

  session_timeout:
    trigger: automatic
    guard: "session.expired"
    from_except: [UNAUTHENTICATED]
    next: UNAUTHENTICATED

# ────────────────────────────────
# Invariants (formal properties)
# ────────────────────────────────
invariants:
  - id: no_deadlock
    rule: "Every non-terminal state MUST have at least one reachable outgoing transition"

  - id: reachable_auth
    rule: "From any state, there MUST exist a path to AUTHENTICATED or UNAUTHENTICATED"

  - id: logout_always_possible
    rule: "From any authenticated state, logout MUST be reachable (via global_transitions)"

  - id: no_undefined_refs
    rule: "Every 'next' value MUST reference a defined state"

  - id: error_codes_defined
    rule: "Every error code used in actions MUST exist in dsl/errors.yaml"

# ────────────────────────────────
# States (8 states)
# ────────────────────────────────
states:

  UNAUTHENTICATED:
    phase: 1
    description: "No valid session. User must log in."
    transitions:

      login_browser:
        trigger: "GET /login"
        guard: "!request.accept_json"
        actions:
          - { type: side_effect, action: create_oidc_flow, params: { provider: google } }
          - { type: http, action: redirect, target: google_authorize_url }
        next: AUTH_PENDING

      login_api:
        trigger: "GET /login"
        guard: "request.accept_json"
        actions:
          - { type: http, action: json_error, error_ref: AUTHENTICATION_REQUIRED }
        next: UNAUTHENTICATED

      access_invite_valid:
        trigger: "GET /invite/{code}"
        guard: "invite.valid && !invite.expired && !invite.used"
        actions:
          - type: http
            action: render_html
            template: invite-landing
        next: UNAUTHENTICATED

      access_invite_expired:
        trigger: "GET /invite/{code}"
        guard: "invite.valid && invite.expired"
        actions:
          - { type: http, action: render_html, template: invite-expired }
        next: UNAUTHENTICATED

      access_invite_used:
        trigger: "GET /invite/{code}"
        guard: "invite.valid && invite.used"
        actions:
          - { type: http, action: render_html, template: invite-used }
        next: UNAUTHENTICATED

      access_invite_invalid:
        trigger: "GET /invite/{code}"
        guard: "!invite.valid"
        actions:
          - { type: http, action: json_error, error_ref: NOT_FOUND }
        next: UNAUTHENTICATED

      forward_auth_fail:
        trigger: "GET /auth/verify"
        actions:
          - { type: http, action: status, params: { status: 401 } }
        next: UNAUTHENTICATED

  # ── AUTH_PENDING (renamed from OIDC_PENDING for SAML extensibility) ──
  AUTH_PENDING:
    phase: 1
    description: "User redirected to identity provider. Waiting for callback."
    timeout:
      duration_seconds: 600
      cleanup: delete_oidc_flow
      next: UNAUTHENTICATED

    transitions:
      # IMPORTANT: error check MUST be evaluated before success check
      callback_error:
        trigger: "GET /callback"
        guard: "oidc_flow.has_error_param"
        priority: 1
        actions:
          - { type: side_effect, action: delete_oidc_flow }
          - { type: audit, event: LOGIN_FAILURE, params: { reason: provider_error } }
          - { type: http, action: render_html, template: error, error_ref: OIDC_PROVIDER_ERROR }
        next: UNAUTHENTICATED

      callback_state_invalid:
        trigger: "GET /callback"
        guard: "!oidc_flow.state_valid"
        priority: 2
        actions:
          - { type: side_effect, action: delete_oidc_flow }
          - { type: audit, event: LOGIN_FAILURE, params: { reason: state_mismatch } }
          - { type: http, action: render_html, template: error, error_ref: AUTH_FAILED }
        next: UNAUTHENTICATED

      callback_nonce_invalid:
        trigger: "GET /callback"
        guard: "oidc_flow.state_valid && !oidc_flow.nonce_valid"
        priority: 3
        actions:
          - { type: side_effect, action: delete_oidc_flow }
          - { type: audit, event: LOGIN_FAILURE, params: { reason: nonce_mismatch } }
          - { type: http, action: render_html, template: error, error_ref: AUTH_FAILED }
        next: UNAUTHENTICATED

      callback_email_not_verified:
        trigger: "GET /callback"
        guard: "oidc_flow.state_valid && oidc_flow.nonce_valid && !oidc_flow.email_verified"
        priority: 4
        actions:
          - { type: side_effect, action: delete_oidc_flow }
          - { type: audit, event: LOGIN_FAILURE, params: { reason: email_not_verified } }
          - { type: http, action: render_html, template: error, error_ref: EMAIL_NOT_VERIFIED }
        next: UNAUTHENTICATED

      callback_success:
        trigger: "GET /callback"
        guard: "oidc_flow.state_valid && oidc_flow.nonce_valid && oidc_flow.email_verified"
        priority: 5
        actions:
          - { type: side_effect, action: upsert_user }
          - { type: side_effect, action: delete_oidc_flow }
          - { type: side_effect, action: create_session }
          - { type: audit, event: LOGIN_SUCCESS }
        # merge_strategy: append — branch actions added after above
        next_if:
          - guard: "invite.present && invite.valid"
            next: INVITE_CONSENT
            actions:
              - { type: http, action: redirect, target: "/invite/{invite.code}/accept" }

          - guard: "user.tenant_count == 1"
            next: AUTHENTICATED
            actions:
              - { type: side_effect, action: auto_select_tenant }
              - { type: http, action: redirect, target: "{request.return_to || config.default_app_url}" }

          - guard: "user.tenant_count > 1"
            next: TENANT_SELECT
            actions:
              - { type: http, action: redirect, target: "/select-tenant" }

          - guard: "user.tenant_count == 0 && !invite.present"
            next: NO_TENANT
            actions:
              - { type: http, action: redirect, target: "/no-tenant" }

  INVITE_CONSENT:
    phase: 1
    description: "User is authenticated. Showing invitation consent screen."
    transitions:
      show_consent:
        trigger: "GET /invite/{code}/accept"
        actions:
          - type: http
            action: render_html
            template: invite-consent
        next: INVITE_CONSENT

      accept:
        trigger: "POST /invite/{code}/accept"
        guard: "invite.valid && !invite.expired && !invite.used && invite.email_match"
        priority: 4
        actions:
          - { type: guard_check, check: csrf_token_valid }
          - { type: side_effect, action: create_membership }
          - { type: side_effect, action: consume_invitation }
          - { type: side_effect, action: set_session_tenant }
          - { type: side_effect, action: issue_jwt }
          - { type: audit, event: INVITATION_ACCEPTED }
          - { type: audit, event: TENANT_JOINED }
          - { type: http, action: redirect, target: "{config.default_app_url || '/'}" }
        next: AUTHENTICATED

      accept_already_member:
        trigger: "POST /invite/{code}/accept"
        guard: "membership.exists"
        priority: 1
        actions:
          - { type: http, action: render_html, template: error, error_ref: CONFLICT }
        next: AUTHENTICATED

      accept_expired:
        trigger: "POST /invite/{code}/accept"
        guard: "invite.expired"
        priority: 2
        actions:
          - { type: http, action: render_html, template: invite-expired }
        next: INVITE_CONSENT

      accept_email_mismatch:
        trigger: "POST /invite/{code}/accept"
        guard: "!invite.email_match"
        priority: 3
        actions:
          - { type: http, action: render_html, template: error, error_ref: INVITATION_EMAIL_MISMATCH }
        next: INVITE_CONSENT

      cancel:
        trigger: "GET /no-tenant"
        guard: "user.tenant_count == 0"
        next: NO_TENANT

      cancel_has_tenant:
        trigger: "GET /select-tenant"
        guard: "user.tenant_count > 0"
        next: TENANT_SELECT

  TENANT_SELECT:
    phase: 1
    description: "User belongs to multiple tenants. Must choose one."
    transitions:
      show_select:
        trigger: "GET /select-tenant"
        actions:
          - { type: http, action: render_html, template: tenant-select }
        next: TENANT_SELECT

      select_no_membership:
        trigger: "POST /auth/switch-tenant"
        guard: "!membership.exists"
        priority: 1
        actions:
          - { type: http, action: json_error, error_ref: TENANT_ACCESS_DENIED }
        next: TENANT_SELECT

      select_suspended:
        trigger: "POST /auth/switch-tenant"
        guard: "tenant.suspended"
        priority: 2
        actions:
          - { type: http, action: json_error, error_ref: TENANT_SUSPENDED }
        next: TENANT_SELECT

      select:
        trigger: "POST /auth/switch-tenant"
        guard: "membership.exists && membership.active && tenant.active"
        priority: 3
        actions:
          - { type: side_effect, action: set_session_tenant }
          - { type: side_effect, action: issue_jwt }
          - { type: audit, event: TENANT_SWITCHED }
          - { type: http, action: json_ok }
        next: AUTHENTICATED

  NO_TENANT:
    phase: 1
    description: "User is authenticated but has no tenant membership and no invitation."
    transitions:
      show_no_tenant:
        trigger: "GET /no-tenant"
        actions:
          - { type: http, action: render_html, template: no-tenant }
        next: NO_TENANT

      receive_invite:
        trigger: "GET /invite/{code}"
        guard: "invite.valid"
        next: INVITE_CONSENT

      # Phase 2: self-service tenant creation
      # create_tenant:
      #   trigger: "POST /api/v1/tenants"
      #   guard: "config.allow_tenant_creation"
      #   phase: 2

  AUTHENTICATED:
    phase: 1
    description: "Fully authenticated. Tenant confirmed. JWT available."
    transitions:

      forward_auth:
        trigger: "GET /auth/verify"
        guard: "session.valid && tenant.active"
        priority: 4
        actions:
          - { type: side_effect, action: touch_session }
          - { type: side_effect, action: issue_jwt_if_needed }
          - { type: http, action: return_volta_headers }
        next: AUTHENTICATED

      refresh:
        trigger: "POST /auth/refresh"
        guard: "session.valid"
        actions:
          - { type: side_effect, action: issue_jwt }
          - { type: http, action: json_ok, params: { token: jwt } }
        next: AUTHENTICATED

      refresh_expired:
        trigger: "POST /auth/refresh"
        guard: "session.expired"
        actions:
          - { type: http, action: json_error, error_ref: SESSION_EXPIRED }
        next: UNAUTHENTICATED

      switch_tenant:
        trigger: "POST /auth/switch-tenant"
        guard: "membership.exists && membership.active && tenant.active"
        actions:
          - { type: side_effect, action: invalidate_current_session }
          - { type: side_effect, action: create_session, params: { tenant_id: target_tenant_id } }
          - { type: side_effect, action: issue_jwt }
          - { type: audit, event: TENANT_SWITCHED }
          - { type: http, action: json_ok }
        next: AUTHENTICATED

      session_expired_verify:
        trigger: "GET /auth/verify"
        guard: "session.expired || !session.valid"
        priority: 1
        actions:
          - { type: http, action: status, params: { status: 401 } }
        next: UNAUTHENTICATED

      tenant_suspended_verify:
        trigger: "GET /auth/verify"
        guard: "session.valid && tenant.suspended"
        priority: 2
        actions:
          - { type: http, action: status, params: { status: 403 } }
        next: TENANT_SUSPENDED

      tenant_inactive_verify:
        trigger: "GET /auth/verify"
        guard: "session.valid && !tenant.active && !tenant.suspended"
        priority: 3
        actions:
          - { type: http, action: json_error, error_ref: TENANT_ACCESS_DENIED }
        next: TENANT_SELECT

      show_sessions:
        trigger: "GET /settings/sessions"
        actions:
          - { type: http, action: render_html, template: sessions }
        next: AUTHENTICATED

      revoke_session:
        trigger: "DELETE /auth/sessions/{id}"
        guard: "target_session.user_id == session.user_id && target_session.id != session.id"
        actions:
          - { type: side_effect, action: invalidate_target_session }
          - { type: audit, event: SESSION_REVOKED }
          - { type: http, action: json_ok }
        next: AUTHENTICATED

      revoke_all_other:
        trigger: "POST /auth/sessions/revoke-all"
        actions:
          - { type: side_effect, action: invalidate_all_other_sessions }
          - { type: audit, event: ALL_SESSIONS_REVOKED }
          - { type: http, action: json_ok }
        next: AUTHENTICATED

      show_members:
        trigger: "GET /admin/members"
        guard: "membership.role in ['ADMIN', 'OWNER']"
        actions:
          - { type: http, action: render_html, template: admin/members }
        next: AUTHENTICATED

      show_invitations:
        trigger: "GET /admin/invitations"
        guard: "membership.role in ['ADMIN', 'OWNER']"
        actions:
          - { type: http, action: render_html, template: admin/invitations }
        next: AUTHENTICATED

  TENANT_SUSPENDED:
    phase: 1
    description: "Current tenant is suspended. User must switch or wait."
    transitions:
      switch_other:
        trigger: "GET /select-tenant"
        guard: "user.tenant_count > 1"
        next: TENANT_SELECT

      show_suspended:
        trigger: "any"
        guard: "user.tenant_count <= 1"
        actions:
          - { type: http, action: render_html, template: error, error_ref: TENANT_SUSPENDED }
        next: TENANT_SUSPENDED

  # ── Phase 2+ reserved ──
  # AUTH_PENDING_SAML:
  #   phase: 3
  #   description: "Waiting for SAML IdP callback"

  # MFA_REQUIRED:
  #   phase: 3
  #   description: "Authenticated but MFA not yet completed"
  #   transitions:
  #     verify_totp:
  #       guard: "mfa.totp_valid"
  #       next: AUTHENTICATED
  #     verify_webauthn:
  #       guard: "mfa.webauthn_valid"
  #       next: AUTHENTICATED

  # ACCOUNT_LOCKED:
  #   phase: 3
  #   timeout: { duration_seconds: 900, next: UNAUTHENTICATED }

# ────────────────────────────────
# Audit events
# ────────────────────────────────
audit_events:
  - LOGIN_SUCCESS
  - LOGIN_FAILURE
  - LOGOUT
  - TENANT_SWITCHED
  - TENANT_JOINED
  - INVITATION_ACCEPTED
  - SESSION_REVOKED
  - ALL_SESSIONS_REVOKED
