# volta-config.yaml JSON Schema (YAML format)
# Validates the volta-auth-proxy configuration file
# Version: 2 (extended with subdomain + routing)

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "volta-config"
description: "volta-auth-proxy configuration — single source of truth for apps, tenants, and defaults"
version: 3
type: object
required: [domain, apps]

# IMPORTANT: volta is a "config aggregation point", NOT a "traffic aggregation point."
# volta does NOT reverse-proxy requests. Traefik does.
# volta generates Traefik dynamic config from this file.
# volta only handles ForwardAuth (auth check, no request body).

properties:

  # ── Domain ──
  domain:
    type: object
    required: [base]
    properties:
      base:
        type: string
        description: "Base domain. Apps are {subdomain}.{base}"
        examples: ["example.com", "mycompany.io"]
      allowed_email_domains:
        type: array
        items:
          type: string
        description: "Global login restriction. Only emails from these domains can log in. Empty = allow all. Replaces Cloudflare Zero Trust Gmail domain restriction."
        examples: [["mycompany.com", "partner.com"]]
        default: []
      ssl:
        type: object
        properties:
          mode:
            type: string
            enum: [traefik, cloudflare, manual]
            default: traefik
            description: "Who manages SSL certificates"

  # ── Apps ──
  apps:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, subdomain, upstream, allowed_roles]
      properties:
        id:
          type: string
          pattern: "^[a-z0-9-]+$"
          description: "Unique app identifier. Lowercase, hyphens allowed."
          examples: ["wiki", "admin-console", "api"]
        name:
          type: string
          description: "Human-readable app name"
          examples: ["Wiki", "Admin Console"]
        subdomain:
          type: string
          pattern: "^[a-z0-9-]+$"
          description: "Subdomain prefix. App will be available at {subdomain}.{domain.base}"
          examples: ["wiki", "admin", "api"]
        upstream:
          type: string
          format: uri
          description: "Backend service URL. Docker service name or IP."
          examples: ["http://wiki:8080", "http://192.168.1.10:3000"]
        allowed_roles:
          type: array
          items:
            type: string
            enum: [OWNER, ADMIN, MEMBER, VIEWER]
          minItems: 1
          description: "Roles that can access this app. Enforced by ForwardAuth."
        public_paths:
          type: array
          items:
            type: string
          description: "Paths that don't require authentication. Supports * wildcard."
          examples: ["/public/*", "/api/v1/public/*", "/healthz"]
          default: []
        health_check:
          type: string
          description: "Path for health check endpoint"
          examples: ["/healthz", "/health"]
        cors:
          type: object
          description: "App-specific CORS configuration"
          properties:
            origins:
              type: array
              items:
                type: string
                format: uri
              description: "Allowed origins"
            methods:
              type: array
              items:
                type: string
                enum: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
            headers:
              type: array
              items:
                type: string
              description: "Allowed headers"
            credentials:
              type: boolean
              default: true
        timeout_ms:
          type: integer
          default: 30000
          description: "Upstream timeout in milliseconds (Traefik responseForwarding)"
        protocol:
          type: string
          enum: [http, ws, grpc]
          default: http
          description: "Upstream protocol. ws enables WebSocket passthrough in Traefik."
        strip_prefix:
          type: string
          description: "Path prefix to strip before forwarding to upstream"
          examples: ["/api"]
        max_body_size:
          type: string
          default: "10MB"
          description: "Max request body size (Traefik buffering config)"
          examples: ["10MB", "100MB", "0"]
        extra_headers:
          type: object
          description: "Additional headers to send to upstream"
          additionalProperties:
            type: string
        visibility:
          type: string
          enum: [public, all, "role:OWNER", "role:ADMIN", "role:MEMBER", "role:VIEWER", bound-users, explicit]
          default: all
          description: "Who can see this app in the dashboard"
        actions:
          type: object
          description: "Per-action role requirements"
          additionalProperties:
            type: string
            enum: [OWNER, ADMIN, MEMBER, VIEWER]
          examples:
            - view: VIEWER
              open: VIEWER
              deploy: ADMIN
              terminal: ADMIN
              config: OWNER
        binding:
          type: object
          description: "Per-user data source binding for this app (Layer 4)"
          additionalProperties:
            type: object
            required: [type]
            properties:
              type:
                type: string
                enum: [filesystem, database, volume, credentials, config, object-storage]
              host_path:
                type: string
                description: "Path template on host. {user} and {tenant} are replaced."
                examples: ["/srv/user-data/{user}/notebooks"]
              container_path:
                type: string
                description: "Mount path inside container"
                examples: ["/data"]
              auto_create:
                type: boolean
                default: true
              template:
                type: string
                description: "Template path to copy on first access"
        metadata:
          type: object
          description: "Arbitrary key-value pairs for app-specific config"
          additionalProperties: true

  # ── Tenancy ──
  # See docs/TENANT-SPEC.md for full architecture (5 layers)
  tenancy:
    type: object
    description: "Multi-tenancy configuration (Layer 2)"
    properties:
      mode:
        type: string
        enum: [single, multi]
        default: single
        description: |
          single: 1 tenant, invisible to users. For home servers, small teams.
          multi: users can belong to multiple orgs. For SaaS, platforms.
      creation_policy:
        type: string
        enum: [disabled, auto, admin_only, invite_only]
        default: disabled
        description: |
          disabled: no new tenants can be created (use existing only)
          auto: signup creates a personal tenant automatically
          admin_only: only platform admins can create tenants
          invite_only: existing tenant admins can create new tenants
      shadow_org:
        type: boolean
        default: true
        description: "In single mode, auto-create an invisible default tenant"
      max_orgs_per_user:
        type: integer
        minimum: 1
        maximum: 100
        default: 1
        description: "Max tenants a user can belong to. 1 = no switching."
      org_display_name:
        type: string
        default: "Organization"
        description: "User-facing name for tenants. e.g. Workspace, Team, Account, Project"
        examples: ["Workspace", "Team", "Account", "Project"]
      member_lifecycle:
        type: string
        enum: [managed, unmanaged]
        default: unmanaged
        description: |
          managed: user lifecycle tied to org (delete org = delete user)
          unmanaged: user exists independently (delete org = remove membership only)
      slug_format:
        type: string
        default: "{name}-{random6}"
        description: "Pattern for auto-generated tenant slugs"

    # ── Tenant Routing ──
      routing:
        type: object
        description: "How to resolve tenant from incoming requests"
        properties:
          mode:
            type: string
            enum: [none, slug, subdomain, domain]
            default: none
            description: |
              none: all requests go to default tenant (single mode)
              slug: tenant identified by URL param or header
              subdomain: tenant identified by Host header ({slug}.{base})
              domain: tenant identified by custom domain mapping
          base_domain:
            type: string
            description: "Base domain for subdomain routing"
            examples: ["app.example.com"]
          slug_header:
            type: string
            default: "X-Volta-Tenant-Slug"
            description: "Header used to pass tenant slug from gateway"
          cookie_scope:
            type: string
            enum: [shared, isolated]
            default: shared
            description: |
              shared: cookie on .{base_domain} — SSO across tenants
              isolated: cookie on {slug}.{base_domain} — security boundary per tenant

  # ── Tenant Resolution (legacy, merged into tenancy.routing) ──
  tenant_resolution:
    type: object
    description: "Tenant resolution strategies (Phase 1 compatible)"
    properties:
      priority:
        type: array
        items:
          type: string
          enum: [session, subdomain, email_domain, invitation, manual]
        default: [session, email_domain, invitation, manual]
        description: "Order of tenant resolution strategies. First match wins."
      free_email_domains:
        type: array
        items:
          type: string
        default:
          - gmail.com
          - googlemail.com
          - outlook.com
          - hotmail.com
          - yahoo.com
          - yahoo.co.jp
          - icloud.com
          - protonmail.com
        description: "Domains excluded from email-based tenant resolution"

  # ── Access ──
  # Per-app access control (Layer 3)
  # Can also be defined per-app in the apps[] array
  access:
    type: object
    description: "Global access defaults (Layer 3)"
    properties:
      default_visibility:
        type: string
        enum: [public, all, bound-users, explicit]
        default: all
        description: |
          public: visible to unauthenticated users
          all: visible to all authenticated members
          bound-users: visible only to users with a Binding
          explicit: visible only to users with explicit ACL entry
      custom_roles:
        type: boolean
        default: false
        description: "Allow tenant admins to define custom roles"
      available_actions:
        type: array
        items:
          type: string
        default: [view, open, deploy, terminal, config, admin, delete]
        description: "Actions that can be assigned to roles"

  # ── Binding ──
  # Per-user data source mapping (Layer 4)
  binding:
    type: object
    description: "Binding Layer configuration (Layer 4). Per-user data source mapping."
    properties:
      enabled:
        type: boolean
        default: false
        description: "Enable Binding Layer features"
      lifecycle:
        type: object
        properties:
          on_user_delete:
            type: string
            enum: [archive, delete]
            default: archive
          on_tenant_delete:
            type: string
            enum: [archive, delete]
            default: archive
          archive_path:
            type: string
            default: "/srv/archives/{tenant}/{user}/"
          retention_days:
            type: integer
            default: 90
      datasource_types:
        type: array
        items:
          type: string
          enum: [filesystem, database, volume, credentials, config, object-storage]
        default: [filesystem, volume]
        description: "Enabled DataSource types"

  # ── Defaults ──
  defaults:
    type: object
    properties:
      app:
        type: string
        description: "Default app ID to redirect after login (if no return_to)"
        examples: ["wiki"]
      role:
        type: string
        enum: [OWNER, ADMIN, MEMBER, VIEWER]
        default: MEMBER
        description: "Default role for new members (via invitation)"
      session_hours:
        type: integer
        minimum: 1
        maximum: 720
        default: 8
        description: "Session sliding window duration in hours"
      jwt_minutes:
        type: integer
        minimum: 1
        maximum: 60
        default: 5
        description: "JWT expiry in minutes"
      max_concurrent_sessions:
        type: integer
        minimum: 1
        maximum: 100
        default: 5
      max_tenants_per_user:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      invitation_expiry_hours:
        type: integer
        minimum: 1
        maximum: 720
        default: 72
      support_contact:
        type: string
        description: "Contact info shown on error pages"
        examples: ["ops@example.com", "https://support.example.com"]

  # ── Traefik Integration ──
  traefik:
    type: object
    description: "Traefik dynamic config generation settings"
    properties:
      enabled:
        type: boolean
        default: true
        description: "Generate Traefik dynamic config from apps list"
      output_path:
        type: string
        default: "/etc/traefik/dynamic/volta.yaml"
        description: "Where to write generated Traefik config"
      middleware_name:
        type: string
        default: "volta-auth"
        description: "Name of the ForwardAuth middleware in Traefik"
      entrypoints:
        type: array
        items:
          type: string
        default: ["websecure"]
        description: "Traefik entrypoints for generated routers"
      tls:
        type: object
        properties:
          cert_resolver:
            type: string
            default: "letsencrypt"
            description: "Traefik certificate resolver name"

  # ── Observability ──
  observability:
    type: object
    properties:
      audit:
        type: object
        properties:
          sink:
            type: string
            enum: [postgres, kafka, elasticsearch]
            default: postgres
          retention_days:
            type: integer
            default: 365
      health_check_interval:
        type: integer
        default: 30
        description: "Seconds between upstream health checks"

# ── Additional constraints ──
# - Each app.id must be unique
# - Each app.subdomain must be unique
# - defaults.app must reference an existing app.id
# - If tenancy.routing.mode is "subdomain", tenancy.routing.base_domain is required
# - If tenancy.mode is "single", tenancy.routing.mode should be "none"
# - If tenancy.mode is "multi", tenancy.max_orgs_per_user should be > 1
# - app.visibility "bound-users" requires binding.enabled: true
# - app.binding requires binding.enabled: true and the datasource type in binding.datasource_types
