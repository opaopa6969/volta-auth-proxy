server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Java backend: auth flow pages (JTE) ---
    location = /login {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /callback {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /select-tenant {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /healthz {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
    }
    location /mfa/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /invite/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /console {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /oauth/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Java backend: API & auth endpoints ---
    location /api/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /.well-known/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
    }

    # --- React SPA fallback (admin console) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
