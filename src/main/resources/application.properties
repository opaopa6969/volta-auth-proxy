# volta-auth-proxy defaults
# Override with: env vars, -D flags, or ~/.volta/application.properties

PORT=7070
DB_HOST=localhost
DB_PORT=54329
DB_NAME=volta_auth
DB_USER=volta
DB_PASSWORD=volta
BASE_URL=http://localhost:7070
GOOGLE_REDIRECT_URI=http://localhost:7070/callback
MICROSOFT_TENANT_ID=common
ALLOWED_REDIRECT_DOMAINS=localhost,127.0.0.1
DEV_MODE=false
JWT_ISSUER=volta-auth
JWT_AUDIENCE=volta-apps
JWT_TTL_SECONDS=300
SESSION_TTL_SECONDS=28800
JWT_KEY_ENCRYPTION_SECRET=dev-only-secret-change-me
APP_CONFIG_PATH=volta-config.yaml
SESSION_STORE=postgres
REDIS_URL=redis://localhost:6379
ALLOW_SELF_SERVICE_TENANT=true
WEBHOOK_ENABLED=false
WEBHOOK_RETRY_MAX=3
WEBHOOK_WORKER_INTERVAL_SECONDS=15
NOTIFICATION_CHANNEL=none
SMTP_PORT=587
SMTP_FROM=noreply@example.com
SAML_SKIP_SIGNATURE=false
AUDIT_SINK=postgres
KAFKA_AUDIT_TOPIC=volta-audit
