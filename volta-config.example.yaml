# volta-auth-proxy Configuration Example
# Schema: dsl/volta-config.schema.yaml
#
# This is the single source of truth for your apps and settings.
# .env is for secrets only. Everything else goes here.
#
# Add an app = add 4 lines. That's it.

domain:
  base: example.com
  ssl:
    mode: traefik                      # traefik auto-generates SSL via Let's Encrypt

apps:
  - id: wiki
    name: "Wiki"
    subdomain: wiki                    # → wiki.example.com
    upstream: http://wiki:8080
    allowed_roles: [MEMBER, ADMIN, OWNER]
    health_check: /healthz
    public_paths:
      - /public/*

  - id: chat
    name: "Chat"
    subdomain: chat                    # → chat.example.com
    upstream: http://chat:3000
    allowed_roles: [MEMBER, ADMIN, OWNER]

  - id: admin
    name: "Admin Console"
    subdomain: admin                   # → admin.example.com
    upstream: http://admin-ui:8080
    allowed_roles: [ADMIN, OWNER]      # Members can't access

  - id: api
    name: "Public API"
    subdomain: api                     # → api.example.com
    upstream: http://api-server:8080
    allowed_roles: [MEMBER, ADMIN, OWNER]
    cors:
      origins: ["https://wiki.example.com", "https://chat.example.com"]
      methods: [GET, POST, PUT, DELETE]

# ── Tenancy (Layer 2) ──
# See docs/TENANT-SPEC.md for details
tenancy:
  mode: single                          # single | multi
  creation_policy: disabled             # disabled | auto | admin_only | invite_only
  shadow_org: true                      # auto-create invisible default tenant
  max_orgs_per_user: 1
  org_display_name: "Workspace"         # shown in UI instead of "Organization"
  member_lifecycle: unmanaged
  routing:
    mode: none                          # none | slug | subdomain | domain

# ── Access (Layer 3) ──
access:
  default_visibility: all               # public | all | bound-users | explicit
  custom_roles: false

# ── Binding (Layer 4) ──
binding:
  enabled: false                        # enable per-user data source mapping
  lifecycle:
    on_user_delete: archive
    retention_days: 90

tenant_resolution:
  priority: [session, email_domain, invitation, manual]
  free_email_domains:
    - gmail.com
    - outlook.com
    - yahoo.com
    - yahoo.co.jp
    - hotmail.com

defaults:
  app: wiki                            # Login → wiki.example.com by default
  role: MEMBER
  session_hours: 8
  jwt_minutes: 5
  max_concurrent_sessions: 5
  max_tenants_per_user: 10
  invitation_expiry_hours: 72
  support_contact: ops@example.com

traefik:
  enabled: true
  output_path: /etc/traefik/dynamic/volta.yaml
  middleware_name: volta-auth
  entrypoints: [websecure]
  tls:
    cert_resolver: letsencrypt

observability:
  audit:
    sink: postgres
    retention_days: 365
